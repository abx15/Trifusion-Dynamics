version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: agencyos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agency_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  mongodb:
    image: mongo:7
    container_name: agencyos-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  redis:
    image: redis:latest
    container_name: agencyos-redis
    ports:
      - "6379:6379"
    restart: always

  auth-api:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile
    container_name: agencyos-auth
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:password@postgres:5432/agency_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGODB_URL=mongodb://mongodb:27017/agency_db
      - PORT=3000
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      - postgres
      - redis
    restart: always

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: agencyos-ai
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    restart: always

  nginx:
    image: nginx:alpine
    container_name: agencyos-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/api.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth-api
      - ai-service
    restart: always

volumes:
  postgres_data:
  mongodb_data:
