name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
  pull_request:
    branches:
      - main
    paths:
      - 'services/**'

jobs:
  auth-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          
      - name: Install Dependencies
        run: pnpm install
        
      - name: Lint
        run: pnpm --filter auth lint
        
      - name: Test
        run: pnpm --filter auth test
        
      - name: Build
        run: pnpm --filter auth build

  ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        working-directory: services/ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8
          
      - name: Lint
        working-directory: services/ai-service
        run: flake8 . || true
        
      - name: Test
        working-directory: services/ai-service
        run: pytest || true
