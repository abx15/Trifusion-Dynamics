version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: tfx-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agency_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d agency_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tfx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-api:
    build:
      context: ../../
      dockerfile: services/auth/Dockerfile
    container_name: tfx-auth-api
    ports:
      - "4000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:password@postgres:5432/agency_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGODB_URL=${MONGODB_URL}
      - PORT=3000
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:3000/api\", (res) => process.exit(res.statusCode === 200 ? 0 : 1))'"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ../../services/ai-service
      dockerfile: Dockerfile
    container_name: tfx-ai-service
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://user:password@postgres:5432/agency_db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5

  agency-web:
    build:
      context: ../../
      dockerfile: apps/agency-web/Dockerfile
    container_name: tfx-agency-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://auth-api:3000/api
    depends_on:
      auth-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:3000/\", (res) => process.exit(res.statusCode === 200 ? 0 : 1))'"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-dashboard:
    build:
      context: ../../
      dockerfile: apps/admin-dashboard/Dockerfile
    container_name: tfx-admin-dashboard
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://auth-api:3000/api
    depends_on:
      auth-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:3000/\", (res) => process.exit(res.statusCode === 200 ? 0 : 1))'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Stub for client-portal (uncomment when app is initialized)
  # client-portal:
  #   build:
  #     context: ../../
  #     dockerfile: apps/client-portal/Dockerfile
  #   container_name: tfx-client-portal
  #   ports:
  #     - "3002:3000"
  #   depends_on:
  #     auth-api:
  #       condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: tfx-nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-api
      - ai-service
      - agency-web
      - admin-dashboard
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
