apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agencyos-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: api.agencyos.local # Change this to your production domain
      http:
        paths:
          - path: /api/ai(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 8000
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: auth-api-service
                port:
                  number: 3000
